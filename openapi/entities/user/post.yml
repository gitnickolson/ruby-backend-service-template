operationId: createUser
summary: Create a user
description: Create a user

tags:
  - Users
  
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - data
        properties:
          data:
            $ref: ./entity.yml#/PostUser
            
responses:
  "201":
    description: Created
    content:
      application/json:
        schema:
          type: object
          required:
            - data
          properties:
            data:
              type: object
              required:
                - id
                - username
                - mailAddress
                - createdAt
              properties:
                id:
                  type: string
                username:
                  type: string
                mailAddress:
                  type: string
                  format: email
                createdAt:
                  type: string
                  format: date-time
  "400":
    description: Bad Request
  "401":
    description: Unauthorized
  "409":
    description: Conflict


