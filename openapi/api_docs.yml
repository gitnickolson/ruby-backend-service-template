                        "type": "string",
                        "maxLength": 20
                      },
                      "mailAddress": {
                        "type": "string",
                        "format": "email",
                        "maxLength": 100
                      },
                      "password": {
                        "type": "string",
                        "format": "password",
                        "maxLength": 30
                      }
                    }
                  }
                }
              }
            }
          }
        },
        "responses": {
