      "get": {
        "operationId": "listUsers",
        "summary": "List all users",
        "description": "Retrieve a paginated list of all users in the system.",
        "tags": [
          "Users"
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "required": [
                    "data"
                  ],
                  "properties": {
                    "data": {
                      "type": "array",
                      "items": {
                        "type": "object",
                        "required": [
                          "id",
                          "username",
                          "mailAddress",
                          "createdAt"
                        ],
                        "properties": {
                          "id": {
                            "type": "string"
                          },
                          "username": {
                            "type": "string",
                            "maxLength": 20
                          },
                          "mailAddress": {
                            "type": "string",
                            "format": "email",
                            "maxLength": 100
                          },
                          "createdAt": {
                            "type": "string",
                            "format": "date-time"
                          }
                        }
                      }
                    }
