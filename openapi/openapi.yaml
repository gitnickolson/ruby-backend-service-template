---
openapi: 3.1.2
info:
  title: Service Name
servers:
  - url: https://api.example.com
    description: Production server
tags:
  - name: Users
    description: User related routes
paths:
  /users:
    post:
      operationId: createUser
      summary: Create a user
      description: Create a user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - username
                    - mailAddress
                    - password
                  properties:
                    username:
                      type: string
                      maxLength: 20
                    mailAddress:
                      type: string
                      format: email
                      maxLength: 100
                    password:
                      type: string
                      format: password
                      maxLength: 30
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - id
                      - username
                      - mailAddress
                      - createdAt
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      mailAddress:
                        type: string
                        format: email
                      createdAt:
                        type: string
                        format: date-time
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "409":
          description: Conflict
    get:
      operationId: listUsers
      summary: List all users
      description: Retrieve a paginated list of all users in the system.
      tags:
        - Users
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - username
                        - mailAddress
                        - createdAt
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                          maxLength: 20
                        mailAddress:
                          type: string
                          format: email
                          maxLength: 100
                        createdAt:
                          type: string
                          format: date-time